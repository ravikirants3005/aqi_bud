name: aqi_buddy
description: "AQI Buddy - Air Quality Awareness, Health Insights & Exposure Tracking by Vayu Aarambh Innovations"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2

  # Location & Network
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  http: ^1.2.2
  connectivity_plus: ^6.0.5

  # Local Storage & Caching
  shared_preferences: ^2.3.3

  # UI & Charts
  fl_chart: ^0.69.2
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  equatable: ^2.0.5
  crypto: ^3.0.3
  uuid: ^4.5.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/config/
